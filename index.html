<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가방 배치 시뮬레이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <button id="settings-btn" class="settings-btn" type="button" title="설정" aria-label="설정 열기">⚙</button>

  <h1>가방 배치 시뮬레이터</h1>
  <p class="subtitle">가방 테트리스 및 용량 계산기</p>
  <p id="data-status" class="data-status">데이터를 불러오는 중...</p>

  <div id="settings-panel" class="settings-panel">
    <div class="settings-section">
      <h2>UI 색상 팔레트</h2>
      <p class="settings-hint">프리셋 또는 원하는 값을 입력하세요.</p>
      <div id="palette-presets" class="palette-presets"></div>

      <button id="palette-custom-toggle" class="text-toggle-btn" type="button">직접 입력하기 ▾</button>
      <div id="palette-custom" class="palette-custom hidden">
        <label>기본 색상 <input type="color" id="theme-base-input" value="#2a1e14"></label>
        <label>하이라이트 <input type="color" id="theme-highlight-input" value="#c9a227"></label>
        <label>그림자 <input type="color" id="theme-shadow-input" value="#1b130c"></label>
        <button id="theme-reset-btn" class="theme-reset-btn" type="button">기본값으로</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>폰트</h2>
      <div id="font-presets" class="font-presets"></div>
    </div>

    <button id="settings-close-btn" class="settings-close-btn" type="button">닫기</button>
  </div>
</header>

<div class="layout">

  <aside class="catalog-panel">
    <div class="catalog-controls">
      <input id="search-input" type="text" placeholder="가방 이름 검색..." autocomplete="off">
      <div id="type-filters" class="type-filters"></div>
      <div id="tag-filters" class="type-filters tag-filters"></div>
      <select id="sort-select">
        <option value="name">이름순</option>
        <option value="out-desc">배치 크기 큰 순</option>
        <option value="out-asc">배치 크기 작은 순</option>
        <option value="in-desc">내부 용량 큰 순</option>
        <option value="in-asc">내부 용량 작은 순</option>
      </select>
    </div>
    <p class="hint">카드를 그리드로 드래그하거나, 카드를 탭한 뒤 그리드 칸을 탭해서 배치하세요.</p>
    <div id="catalog-list" class="catalog-list"></div>
  </aside>

  <main class="board-panel">
    <div class="board-toolbar">
      <div class="grid-size-info">현재 인벤토리 크기: <strong id="grid-size-label">6 × 10칸</strong></div>
      <label>인벤토리 확장권 사용 개수 (0~3)
        <input id="ext-input" type="number" min="0" max="3" value="0">
      </label>
      <button id="clear-btn" class="danger-btn">전체 초기화</button>
    </div>
    <p id="place-message" class="place-message"></p>

    <div class="board-window">
      <div class="board-titlebar">
        <span class="titlebar-icon" id="titlebar-clear-icon" title="전체 초기화">🗑</span>
        <span class="titlebar-label">소지품</span>
        <span class="titlebar-window-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </div>
      <div class="board-wrapper">
        <div id="grid" class="grid"></div>
      </div>
    </div>

    <div class="summary-panel">
      <div class="summary-item">
        <span class="summary-label">배치된 가방</span>
        <span id="summary-count" class="summary-value">0개</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">사용 중인 인벤토리 칸</span>
        <span id="summary-cells" class="summary-value">0 / 0</span>
      </div>
      <div class="summary-item highlight">
        <span class="summary-label">총 내부 용량 합계</span>
        <span id="summary-capacity" class="summary-value">0칸</span>
      </div>
    </div>
  </main>

</div>

<footer class="app-footer">
  가방 데이터 출처: Google Sheets 연동 · 이 페이지는 정적 파일로만 동작하며 별도 서버가 필요하지 않습니다.
</footer>

<script src="app.js"></script>
</body>
</html>
